name: Build Windows Installer

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r windows/requirements.txt
          pip install pyinstaller

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build Buni-Windows.exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name Buni-Windows `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            windows/buni.py

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          iscc /DAppVersion=${{ steps.version.outputs.VERSION }} /DExeSource=${{ github.workspace }}\dist\Buni-Windows.exe windows\installer.iss

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/Buni-Windows-Setup-${{ steps.version.outputs.VERSION }}.exe
            dist/Buni-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
